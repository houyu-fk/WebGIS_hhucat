<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>明星榜与互动 - 校园猫猫地图</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.3.4.3.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen">
<div class="w-[375px] h-[812px] bg-[#FFF9F0] relative overflow-hidden shadow-2xl rounded-[40px] border-[8px] border-gray-800 flex flex-col">
<!-- 头部背景 -->
<div class="h-48 bg-[#FF9F43] rounded-b-[50px] relative p-8">
<h1 class="text-white text-2xl font-bold mt-4">校园互动中心</h1>
<p class="text-white/80 text-sm mt-1">记录每一次温暖的邂逅</p>
<div class="absolute -bottom-8 left-1/2 -translate-x-1/2 w-[310px] bg-white rounded-3xl shadow-xl p-4 flex justify-between items-center">
<div class="flex items-center gap-3">
<div class="w-10 h-10 bg-orange-100 rounded-full flex items-center justify-center text-[#FF9F43]">
<iconify-icon class="text-xl" icon="ph:stamp-fill"></iconify-icon>
</div>
<div>
<p class="text-[10px] text-gray-500">猫咪集章</p>
<p class="text-sm font-bold text-gray-800">已解锁 3 / 42</p>
</div>
</div>
<div class="h-1.5 w-24 bg-gray-100 rounded-full overflow-hidden">
<div class="w-1/4 h-full bg-[#FF9F43]"></div>
</div>
</div>
</div>
<!-- 标签切换 -->
<div class="mt-12 flex px-8 gap-6 border-b border-orange-100">
<button class="pb-3 border-b-2 border-[#FF9F43] text-gray-800 font-bold text-sm">明星猫咪</button>
<button class="pb-3 text-gray-400 text-sm">投喂达人</button>
<button class="pb-3 text-gray-400 text-sm">成就勋章</button>
</div>
<div class="flex-1 overflow-y-auto px-6 py-4 space-y-4 pb-24">
<!-- 明星猫 Top 1 -->
<div class="bg-white rounded-[28px] p-4 flex items-center gap-4 relative overflow-hidden shadow-sm border border-orange-50">
<div class="absolute top-0 right-0 w-16 h-16 bg-gradient-to-bl from-orange-400 to-transparent opacity-10 rounded-bl-full"></div>
<iconify-icon class="absolute top-3 right-3 text-yellow-400 text-2xl" icon="ph:crown-fill"></iconify-icon>
<span class="w-8 text-2xl font-black italic text-orange-200">01</span>
<img class="w-16 h-16 rounded-full border-2 border-[#FF9F43] p-0.5" src="/agent-py/static/source/images/placeholder.svg"/>
<div class="flex-1">
<h3 class="font-bold text-gray-800">大橘</h3>
<p class="text-[10px] text-gray-400 flex items-center gap-1">
<iconify-icon class="text-red-400" icon="ph:heart-fill"></iconify-icon>
                        人气值: 2,840
                    </p>
<div class="mt-1 h-1 w-24 bg-gray-100 rounded-full">
<div class="w-full h-full bg-orange-400 rounded-full"></div>
</div>
</div>
<div class="text-right">
<span class="text-[10px] bg-orange-100 text-[#FF9F43] px-2 py-1 rounded-full font-bold">霸榜 2 周</span>
</div>
</div>
<!-- 明星猫 Top 2 -->
<div class="bg-white rounded-[28px] p-4 flex items-center gap-4 shadow-sm border border-gray-50">
<span class="w-8 text-2xl font-black italic text-gray-200">02</span>
<img class="w-14 h-14 rounded-full border-2 border-gray-100 p-0.5" src="/agent-py/static/source/images/placeholder.svg"/>
<div class="flex-1">
<h3 class="font-bold text-gray-800">警长</h3>
<p class="text-[10px] text-gray-400 flex items-center gap-1">
<iconify-icon class="text-red-400" icon="ph:heart-fill"></iconify-icon>
                        人气值: 1,920
                    </p>
</div>
<iconify-icon class="text-green-400" icon="ph:caret-up-fill"></iconify-icon>
</div>
<!-- 明星猫 Top 3 -->
<div class="bg-white rounded-[28px] p-4 flex items-center gap-4 shadow-sm border border-gray-50">
<span class="w-8 text-2xl font-black italic text-gray-200">03</span>
<img class="w-14 h-14 rounded-full border-2 border-gray-100 p-0.5" src="/agent-py/static/source/images/placeholder.svg"/>
<div class="flex-1">
<h3 class="font-bold text-gray-800">三花儿</h3>
<p class="text-[10px] text-gray-400 flex items-center gap-1">
<iconify-icon class="text-red-400" icon="ph:heart-fill"></iconify-icon>
                        人气值: 1,560
                    </p>
</div>
<iconify-icon class="text-red-400" icon="ph:caret-down-fill"></iconify-icon>
</div>
<!-- 集章系统入口 -->
<div class="mt-6">
<div class="flex justify-between items-center mb-4">
<h2 class="font-bold text-gray-800 flex items-center gap-2">
<iconify-icon class="text-[#FF9F43]" icon="ph:grid-four-fill"></iconify-icon>
                        集章进度
                    </h2>
<span class="text-xs text-[#FF9F43]">查看全部 &gt;</span>
</div>
<div class="grid grid-cols-4 gap-4">
<!-- 已解锁 -->
<div class="flex flex-col items-center gap-2">
<div class="w-14 h-14 bg-white rounded-2xl shadow-sm flex items-center justify-center border-2 border-[#FF9F43]">
<img class="w-10 h-10 object-contain rounded-lg" src="/agent-py/static/source/images/placeholder.svg"/>
</div>
<span class="text-[10px] text-gray-600">大橘</span>
</div>
<div class="flex flex-col items-center gap-2">
<div class="w-14 h-14 bg-white rounded-2xl shadow-sm flex items-center justify-center border-2 border-[#FF9F43]">
<img class="w-10 h-10 object-contain rounded-lg" src="/agent-py/static/source/images/placeholder.svg"/>
</div>
<span class="text-[10px] text-gray-600">警长</span>
</div>
<!-- 未解锁 -->
<div class="flex flex-col items-center gap-2 opacity-30 grayscale">
<div class="w-14 h-14 bg-gray-200 rounded-2xl flex items-center justify-center">
<iconify-icon class="text-gray-400" icon="ph:lock-fill"></iconify-icon>
</div>
<span class="text-[10px] text-gray-400">三花儿</span>
</div>
<div class="flex flex-col items-center gap-2 opacity-30 grayscale">
<div class="w-14 h-14 bg-gray-200 rounded-2xl flex items-center justify-center">
<iconify-icon class="text-gray-400" icon="ph:lock-fill"></iconify-icon>
</div>
<span class="text-[10px] text-gray-400">小黑</span>
</div>
</div>
</div>
<!-- 投喂看板卡片 -->
<div class="mt-4 bg-gradient-to-br from-orange-400 to-orange-500 rounded-3xl p-5 text-white flex justify-between items-center">
<div>
<h4 class="font-bold">投喂记录分析</h4>
<p class="text-[10px] opacity-80 mt-1">本月全校共计投喂 3,210 次</p>
</div>
<a class="bg-white text-[#FF9F43] px-4 py-2 rounded-xl text-xs font-bold" href="stats.html">查看看板</a>
</div>
</div>
<!-- 底部 TabBar -->
<div class="absolute bottom-0 w-full h-20 bg-white border-t border-gray-100 flex items-center justify-around px-2 pb-2 z-30">
<a class="flex flex-col items-center gap-1 text-gray-400" href="index.html">
<iconify-icon class="text-2xl" icon="ph:map-trifold-fill"></iconify-icon>
<span class="text-[10px]">首页</span>
</a>
<a class="flex flex-col items-center gap-1 text-gray-400" href="atlas.html">
<iconify-icon class="text-2xl" icon="ph:cat-fill"></iconify-icon>
<span class="text-[10px]">图鉴</span>
</a>
<div class="relative -top-5">
<a class="w-14 h-14 bg-[#FF9F43] rounded-full flex items-center justify-center text-white shadow-lg border-4 border-white" href="checkin.html">
<iconify-icon class="text-2xl" icon="ph:camera-fill"></iconify-icon>
</a>
</div>
<a class="flex flex-col items-center gap-1 text-[#FF9F43]" href="ranking.html">
<iconify-icon class="text-2xl" icon="ph:crown-fill"></iconify-icon>
<span class="text-[10px] font-bold">排行榜</span>
</a>
<a class="flex flex-col items-center gap-1 text-gray-400" href="profile.html">
<iconify-icon class="text-2xl" icon="ph:user-fill"></iconify-icon>
<span class="text-[10px]">我的</span>
</a>
</div>
</div>
</body>
</html>
