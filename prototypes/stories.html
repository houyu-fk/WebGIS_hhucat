<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>故事墙 - 校园猫猫地图</title>
    <script src="https://modao.cc/agent-py/static/source/js/tailwindcss.3.4.3.js"></script>
    <script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen">
<div class="w-[375px] h-[812px] bg-[#FFF9F0] relative overflow-hidden shadow-2xl rounded-[40px] border-[8px] border-gray-800 flex flex-col">

    <div class="pt-12 px-6 pb-4 bg-white flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-bold">故事墙</h1>
            <p class="text-sm text-gray-500" id="totalStories">加载中...</p>
        </div>
        <button onclick="showWriteModal()" 
                class="bg-[#FF9F43] text-white px-5 py-2 rounded-2xl font-bold flex items-center gap-1">
            <iconify-icon icon="ph:plus-bold"></iconify-icon>
            写故事
        </button>
    </div>

    <div class="flex-1 overflow-y-auto px-4 py-4 space-y-4 pb-24" id="storiesList"></div>

    <!-- 底部导航栏（保持不变） -->
    <div class="absolute bottom-0 w-full h-20 bg-white border-t border-gray-100 flex items-center justify-around px-2 z-30">
        <a href="index.html" class="flex flex-col items-center gap-1 text-gray-400">
            <iconify-icon class="text-3xl" icon="ph:map-trifold-fill"></iconify-icon>
            <span class="text-[10px]">地图</span>
        </a>
        <a href="atlas.html" class="flex flex-col items-center gap-1 text-gray-400">
            <iconify-icon class="text-3xl" icon="ph:cat-fill"></iconify-icon>
            <span class="text-[10px]">图鉴</span>
        </a>
        <a href="checkin.html" class="flex flex-col items-center gap-1 -mt-8">
            <div class="w-16 h-16 bg-[#FF9F43] rounded-full flex items-center justify-center text-white shadow-2xl border-4 border-white">
                <iconify-icon class="text-4xl" icon="ph:camera-fill"></iconify-icon>
            </div>
            <span class="text-[10px] font-bold text-[#FF9F43] mt-1">打卡</span>
        </a>
        <a href="stories.html" class="flex flex-col items-center gap-1 text-[#FF9F43]">
            <iconify-icon class="text-3xl" icon="ph:chat-teardrop-text-fill"></iconify-icon>
            <span class="text-[10px] font-bold">故事</span>
        </a>
        <a href="profile.html" class="flex flex-col items-center gap-1 text-gray-400">
            <iconify-icon class="text-3xl" icon="ph:user-circle-fill"></iconify-icon>
            <span class="text-[10px]">我的</span>
        </a>
    </div>
</div>

<!-- 写故事弹窗 -->
<div id="writeModal" class="hidden fixed inset-0 bg-black/70 flex items-end z-50">
    <div class="bg-white w-full rounded-t-3xl p-6">
        <h3 class="font-bold text-xl mb-4">写故事</h3>
        
        <select id="catSelect" class="w-full border border-gray-300 rounded-2xl p-4 mb-4">
            <option value="">选择猫咪...</option>
        </select>
        
        <textarea id="storyText" class="w-full h-40 border border-gray-300 rounded-3xl p-4" 
                  placeholder="分享你和猫咪的故事..."></textarea>
        
        <div class="mt-6 flex gap-3">
            <button onclick="closeModal()" class="flex-1 py-3 border rounded-2xl font-bold">取消</button>
            <button onclick="submitStory()" class="flex-1 py-3 bg-[#FF9F43] text-white rounded-2xl font-bold">发布</button>
        </div>
    </div>
</div>

<script>
// 加载所有故事
async function loadStories() {
    const container = document.getElementById('storiesList');
    container.innerHTML = `<p class="text-center text-gray-500 py-10">加载中...</p>`;

    try {
        const res = await fetch('http://localhost:8080/api/stories');
        if (!res.ok) throw new Error('请求失败');
        
        const stories = await res.json();
        
        document.getElementById('totalStories').textContent = `共 ${stories.length} 条故事`;

        if (stories.length === 0) {
            container.innerHTML = `<p class="text-center text-gray-500 py-20">还没有故事，快来发布第一条吧～</p>`;
            return;
        }

        container.innerHTML = '';
        stories.forEach(story => {
            const div = document.createElement('div');
            div.className = "bg-white rounded-3xl p-5 shadow-sm";
            div.innerHTML = `
                <div class="flex items-center gap-3">
                    <img class="w-10 h-10 rounded-full" src="https://modao.cc/agent-py/static/source/images/placeholder.svg"/>
                    <div class="flex-1">
                        <p class="font-bold">${story.authorName || '匿名用户'}</p>
                        <p class="text-xs text-gray-400">${story.createdAt ? story.createdAt.substring(0,16) : ''}</p>
                    </div>
                </div>
                <p class="mt-4 text-gray-700 leading-relaxed">${story.content}</p>
                <div class="mt-4 text-orange-500">❤️ ${story.likes || 0}</div>
            `;
            container.appendChild(div);
        });
    } catch (err) {
        console.error(err);
        container.innerHTML = `
            <p class="text-center text-red-500 py-10">
                无法连接后端<br>
                请确认：<br>
                1. 后端已启动（localhost:8080）<br>
                2. /api/stories 接口正常
            </p>`;
    }
}

// 写故事相关函数
function showWriteModal() {
    document.getElementById('writeModal').classList.remove('hidden');
    
    // 加载猫咪列表
    fetch('http://localhost:8080/api/cats')
        .then(res => res.json())
        .then(cats => {
            const select = document.getElementById('catSelect');
            select.innerHTML = '<option value="">选择猫咪...</option>';
            cats.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat.id;
                opt.textContent = cat.name;
                select.appendChild(opt);
            });
        });
}

function closeModal() {
    document.getElementById('writeModal').classList.add('hidden');
    document.getElementById('storyText').value = '';
}

async function submitStory() {
    const content = document.getElementById('storyText').value.trim();
    const catId = document.getElementById('catSelect').value;

    if (!content || !catId) {
        alert("请选择猫咪并填写内容！");
        return;
    }

    try {
        const res = await fetch('http://localhost:8080/api/stories', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                catId: parseInt(catId),
                authorName: "当前用户",
                content: content
            })
        });

        if (res.ok) {
            alert("✅ 故事发布成功！");
            closeModal();
            loadStories();   // 刷新列表
        } else {
            alert("发布失败");
        }
    } catch (err) {
        console.error(err);
        alert("网络错误，请确认后端运行正常");
    }
}

// 初始化
window.onload = loadStories;
</script>
</body>
</html>
