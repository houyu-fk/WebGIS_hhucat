<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>猫咪图鉴 - 校园猫猫地图</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.3.4.3.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen">
<div class="w-[375px] h-[812px] bg-[#FFF9F0] relative overflow-hidden shadow-2xl rounded-[40px] border-[8px] border-gray-800 flex flex-col">

<div class="pt-12 px-6 pb-4 bg-white">
    <h1 class="text-2xl font-bold text-gray-800">校园猫咪图鉴</h1>
    <p class="text-sm text-gray-500 mt-1" id="catCount">已收录 0 只萌友</p>
</div>

<div class="flex-1 overflow-y-auto px-4 py-4 space-y-4 pb-24" id="catList"></div>

<!-- 底部导航栏 -->
<div class="absolute bottom-0 w-full h-20 bg-white border-t border-gray-100 flex items-center justify-around px-2 z-30">
    <a href="index.html" class="flex flex-col items-center gap-1 text-gray-400">
        <iconify-icon class="text-3xl" icon="ph:map-trifold-fill"></iconify-icon>
        <span class="text-[10px]">地图</span>
    </a>
    <a href="atlas.html" class="flex flex-col items-center gap-1 text-[#FF9F43]">
        <iconify-icon class="text-3xl" icon="ph:cat-fill"></iconify-icon>
        <span class="text-[10px] font-bold">图鉴</span>
    </a>
    <a href="checkin.html" class="flex flex-col items-center gap-1 -mt-8">
        <div class="w-16 h-16 bg-[#FF9F43] rounded-full flex items-center justify-center text-white shadow-2xl border-4 border-white">
            <iconify-icon class="text-4xl" icon="ph:camera-fill"></iconify-icon>
        </div>
        <span class="text-[10px] font-bold text-[#FF9F43] mt-1">打卡</span>
    </a>
    <a href="stories.html" class="flex flex-col items-center gap-1 text-gray-400">
        <iconify-icon class="text-3xl" icon="ph:chat-teardrop-text-fill"></iconify-icon>
        <span class="text-[10px]">故事</span>
    </a>
    <a href="profile.html" class="flex flex-col items-center gap-1 text-gray-400">
        <iconify-icon class="text-3xl" icon="ph:user-circle-fill"></iconify-icon>
        <span class="text-[10px]">我的</span>
    </a>
</div>
</div>

<script>
// 加载猫咪列表
fetch('http://localhost:8080/api/cats')
  .then(res => res.json())
  .then(cats => {
    document.getElementById('catCount').textContent = `已收录 ${cats.length} 只萌友`;
    
    const container = document.getElementById('catList');
    container.innerHTML = '';

    cats.forEach(cat => {
      const imageSrc = cat.imageUrl || cat.image_url || cat.imagePath || 
                      "https://modao.cc/agent-py/media/generated_images/2026-04-21/5edc1de453b74b67afb57af4a481e4da.jpg";
      
      const card = document.createElement('a');
      card.href = `detail.html?id=${cat.id}`;
      card.className = 'block bg-white rounded-[24px] p-4 shadow-sm hover:shadow-md transition-all';
      card.innerHTML = `
        <div class="flex gap-4">
          <div class="relative">
            <img alt="${cat.name}" class="w-24 h-24 rounded-2xl object-cover" 
                 src="${imageSrc}"
                 onerror="this.src='https://modao.cc/agent-py/media/generated_images/2026-04-21/5edc1de453b74b67afb57af4a481e4da.jpg'"/>
            <div class="absolute -top-2 -left-2 bg-orange-400 text-white text-[10px] font-bold px-2 py-0.5 rounded-lg">ID: ${cat.id}</div>
          </div>
          <div class="flex-1">
            <div class="flex justify-between">
              <h3 class="font-bold text-lg">${cat.name}</h3>
              <span class="text-xs px-2 py-1 rounded-full ${cat.neutered === '已绝育' ? 'bg-green-100 text-green-600' : 'bg-gray-100 text-gray-400'}">
                ${cat.neutered || '未知'}
              </span>
            </div>
            <p class="text-sm text-gray-500 mt-1">${cat.characterDesc || '暂无描述'}</p>
            <div class="mt-2 flex gap-2">
              <span class="text-xs bg-orange-50 text-orange-600 px-3 py-1 rounded-full">#${cat.breed || '未知'}</span>
            </div>
          </div>
        </div>
      `;
      container.appendChild(card);
    });
  })
  .catch(err => {
    console.error(err);
    document.getElementById('catList').innerHTML = '<p class="text-center text-red-500 py-10">无法连接后端，请确保后端已启动</p>';
  });
</script>
</body>
</html>
