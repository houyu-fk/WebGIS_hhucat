<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>偶遇打卡</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.3.4.3.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen">
<div class="w-[375px] h-[812px] bg-black relative overflow-hidden shadow-2xl rounded-[40px] border-[8px] border-gray-800 flex flex-col">

    <div class="absolute inset-0 bg-gray-900">
        <img class="w-full h-full object-cover opacity-80" src="https://modao.cc/agent-py/media/generated_images/2026-04-21/dee673a6641540cfac92d85c54825d40.jpg" />
    </div>

    <div class="absolute top-12 left-6 z-20">
        <a href="index.html" class="w-10 h-10 bg-black/30 backdrop-blur-md rounded-full flex items-center justify-center text-white">
            <iconify-icon icon="ph:caret-left-bold"></iconify-icon>
        </a>
    </div>

    <div class="absolute bottom-40 left-1/2 -translate-x-1/2 w-[340px] bg-white rounded-3xl p-5 shadow-2xl scale-0 transition-all z-30" id="aiResult"></div>

    <div class="absolute bottom-0 w-full h-44 bg-gradient-to-t from-black/80 to-transparent flex flex-col items-center justify-end pb-10 z-20">
        <button onclick="startScan()" class="w-20 h-20 bg-white rounded-full flex items-center justify-center shadow-2xl">
            <div class="w-16 h-16 bg-white border-4 border-gray-100 rounded-full"></div>
        </button>
    </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const preCatId = params.get('catId');

function startScan() {
    const scanner = document.createElement('div');
    scanner.className = "absolute inset-0 bg-black/70 flex items-center justify-center text-white text-xl";
    scanner.innerHTML = `<p>AI识别中...</p>`;
    document.body.appendChild(scanner);

    setTimeout(() => {
        scanner.remove();
        showResult();
    }, 1800);
}

function showResult() {
    const catId = preCatId || 1;
    
    fetch(`http://localhost:8080/api/cats/${catId}`)
        .then(res => res.json())
        .then(cat => {
            document.getElementById('aiResult').innerHTML = `
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-12 h-12 bg-orange-100 rounded-full flex items-center justify-center text-[#FF9F43]">
                        <iconify-icon class="text-2xl" icon="ph:sparkle-fill"></iconify-icon>
                    </div>
                    <div>
                        <h3 class="font-bold">AI 识别成功!</h3>
                        <p class="text-xs text-gray-500">置信度: 96.8%</p>
                    </div>
                </div>
                <div class="bg-gray-50 rounded-2xl p-4">
                    <h4 class="font-bold">${cat.name} (ID: ${cat.id})</h4>
                    <p class="text-sm text-gray-500">${cat.locationDesc || '校园内'}</p>
                </div>
                <div class="mt-5 flex gap-3">
                    <button onclick="location.reload()" class="flex-1 py-3 bg-gray-100 rounded-2xl font-bold">重新识别</button>
                    <button onclick="submitCheckin(${cat.id})" class="flex-1 py-3 bg-[#FF9F43] text-white rounded-2xl font-bold">确认打卡</button>
                </div>
            `;
            document.getElementById('aiResult').classList.remove('scale-0');
        });
}

function submitCheckin(catId) {
    fetch('http://localhost:8080/api/checkins', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            userId: 1,
            catId: parseInt(catId),
            notes: '偶遇打卡',
            photoUrl: ''
        })
    })
    .then(res => {
        if (res.ok) {
            alert('🎉 打卡成功！获得 5 积分');
            document.getElementById('aiResult').classList.add('scale-0');
        } else {
            alert('打卡失败');
        }
    })
    .catch(() => alert('网络错误，请确认后端运行中'));
}

// 如果从地图跳转过来，直接显示结果
if (preCatId) setTimeout(showResult, 800);
</script>
</body>
</html>
