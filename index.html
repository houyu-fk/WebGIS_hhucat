<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>校园猫猫地图 - 首页</title>
    <script src="https://modao.cc/agent-py/static/source/js/tailwindcss.3.4.3.js"></script>
    <script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>

    <script type="text/javascript">
        window._AMapSecurityConfig = {
            securityJsCode: "7feaccc2d2562cbf81c2a5ec4c3eaf0c", // 建议在后台申请后填入
        };
    </script>
    <script src="https://webapi.amap.com/maps?v=2.0&key=993ed41f7983bca104be917505186e79"></script>

    <style>
        @keyframes pulse-orange {
            0% {
                transform: scale(1);
                opacity: 0.8;
            }

            50% {
                transform: scale(1.2);
                opacity: 1;
            }

            100% {
                transform: scale(1);
                opacity: 0.8;
            }
        }

        .cat-marker-container {
            position: relative;
            cursor: pointer;
        }
        /* 保持原有的点位动画样式 */
        .cat-marker-icon {
            animation: pulse-orange 2s infinite ease-in-out;
            background-color: #FF9F43;
            padding: 8px;
            border-radius: 999px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            border: 2px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .safe-area-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
        /* 隐藏地图版权信息以美化小程序界面 */
        .amap-logo, .amap-copyright {
            display: none !important;
        }
    </style>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen">

    <div class="w-[375px] h-[812px] bg-[#FFF9F0] relative overflow-hidden shadow-2xl rounded-[40px] border-[8px] border-gray-800">

        <div class="absolute top-0 w-full h-20 bg-white/80 backdrop-blur-md z-10 flex items-end pb-2 px-6 justify-between">
            <div class="flex items-center gap-2">
                <iconify-icon class="text-[#FF9F43] text-2xl" icon="mdi:cat"></iconify-icon>
                <span class="font-bold text-gray-800 text-lg">河海校园猫咪地图</span>
            </div>
            <div class="flex items-center gap-4 mb-1">
                <iconify-icon class="text-gray-600 text-xl" icon="ph:magnifying-glass-bold"></iconify-icon>
                <iconify-icon class="text-gray-600 text-xl" icon="ph:bell-bold"></iconify-icon>
            </div>
        </div>

        <div id="map-container" class="w-full h-full bg-[#e5e7eb]"></div>

        <div class="absolute right-4 bottom-24 flex flex-col gap-3 z-10">
            <button id="recenter-btn" class="w-12 h-12 bg-white rounded-full shadow-xl flex items-center justify-center text-[#FF9F43]">
                <iconify-icon class="text-2xl" icon="ph:crosshair-bold"></iconify-icon>
            </button>
            <a class="w-12 h-12 bg-white rounded-full shadow-xl flex items-center justify-center text-[#FF9F43]" href="stats.html">
                <iconify-icon class="text-2xl" icon="ph:chart-bar-fill"></iconify-icon>
            </a>
        </div>

        <div class="absolute bottom-24 left-1/2 -translate-x-1/2 w-[340px] bg-white rounded-3xl shadow-2xl p-4 transition-all transform translate-y-[200%] duration-300 z-20" id="catCard">
            <div class="flex gap-4">
                <img alt="Cat Avatar" class="w-20 h-20 rounded-2xl object-cover" src="https://modao.cc/agent-py/media/generated_images/2026-04-21/5c79913aab7c4bc88514efd27611f3c2.jpg" />
                <div class="flex-1">
                    <div class="flex justify-between items-start">
                        <h3 class="text-xl font-bold text-gray-800" id="catName">警长</h3>
                        <span class="bg-green-100 text-green-600 text-[10px] px-2 py-1 rounded-full" id="catStatus">健康</span>
                    </div>
                    <p class="text-sm text-gray-500 mt-1 flex items-center gap-1">
                        <iconify-icon icon="ph:map-pin-fill"></iconify-icon>
                        <span id="catLoc">教一楼</span>
                    </p>
                    <div class="flex gap-2 mt-2">
                        <span class="text-[10px] bg-orange-50 text-orange-600 px-2 py-1 rounded-md">性格亲人</span>
                        <span class="text-[10px] bg-blue-50 text-blue-600 px-2 py-1 rounded-md">已绝育</span>
                    </div>
                </div>
            </div>
            <div class="mt-4 flex gap-2">
                <a class="flex-1 bg-orange-50 text-[#FF9F43] py-2 rounded-xl text-center font-bold text-sm" href="detail.html">查看档案</a>
                <a class="flex-1 bg-[#FF9F43] text-white py-2 rounded-xl text-center font-bold text-sm" href="checkin.html">去打卡</a>
            </div>
        </div>

        <div class="absolute bottom-0 w-full h-20 bg-white border-t border-gray-100 flex items-center justify-around px-2 pb-2 z-30">
            <a class="flex flex-col items-center gap-1 text-[#FF9F43]" href="index.html">
                <iconify-icon class="text-2xl" icon="ph:map-trifold-fill"></iconify-icon>
                <span class="text-[10px] font-bold">首页</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-gray-400" href="atlas.html">
                <iconify-icon class="text-2xl" icon="ph:cat-fill"></iconify-icon>
                <span class="text-[10px]">图鉴</span>
            </a>
            <div class="relative -top-5">
                <a class="w-14 h-14 bg-[#FF9F43] rounded-full flex items-center justify-center text-white shadow-lg border-4 border-white" href="checkin.html">
                    <iconify-icon class="text-2xl" icon="ph:camera-fill"></iconify-icon>
                </a>
            </div>
            <a class="flex flex-col items-center gap-1 text-gray-400" href="ranking.html">
                <iconify-icon class="text-2xl" icon="ph:crown-fill"></iconify-icon>
                <span class="text-[10px]">排行榜</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-gray-400" href="profile.html">
                <iconify-icon class="text-2xl" icon="ph:user-fill"></iconify-icon>
                <span class="text-[10px]">我的</span>
            </a>
        </div>
    </div>

    <script>
        // 初始化地图，定位到河海大学江宁校区点
        const map = new AMap.Map('map-container', {
            zoom: 16,
            center: [118.786000, 31.915500],
            viewMode: '2D'
        });

        // 定义猫咪数据和坐标
        const cats = [
            { name: '大橘', gender: '公', color: '橘色条纹', loc: '图书馆', status: '健康', action: '猫粮投喂中', pos: [118.786251, 31.914028] },
            { name: '小黑', gender: '母', color: '纯黑', loc: '18舍', status: '已绝育', action: '睡眠中', pos: [118.781500, 31.91458] },
            { name: '警长', gender: '公', color: '黑白花色', loc: '叠翠山', status: '健康', action: '正在散步', pos: [118.786351, 31.91657] }
        ];

        // 渲染地图标记 (Marker)
        cats.forEach(cat => {
            const markerContent = `
                    <div class="cat-marker-container">
                        <div class="cat-marker-icon">
                            <iconify-icon class="text-white text-xl" icon="mdi:cat"></iconify-icon>
                        </div>
                        <div class="absolute -top-8 left-1/2 -translate-x-1/2 bg-white px-2 py-1 rounded-full text-[10px] font-bold shadow-sm whitespace-nowrap">
                            ${cat.loc}-${cat.name}
                        </div>
                    </div>`;

            const marker = new AMap.Marker({
                position: cat.pos,
                content: markerContent,
                offset: new AMap.Pixel(-15, -15)
            });

            // 绑定点击展示卡片功能
            marker.on('click', () => {
                showCard(cat.name, cat.loc, cat.status, cat.action);
            });

            map.add(marker);
        });

        // 展示卡片逻辑
        function showCard(name, loc, status, action) {
            const card = document.getElementById('catCard');
            document.getElementById('catName').innerText = name;
            document.getElementById('catLoc').innerText = loc;
            document.getElementById('catStatus').innerText = status;

            // 关键：修改“查看档案”按钮的跳转链接，带上 name 参数
            const detailBtn = card.querySelector('a[href^="detail.html"]');
            if (detailBtn) {
                detailBtn.href = `detail.html?name=${encodeURIComponent(name)}`;
            }

            card.style.transform = 'translateY(0) translateX(-50%)';

            // 点击地图其他地方隐藏卡片
            map.on('click', () => {
                card.style.transform = 'translateY(200%) translateX(-50%)';
            });
        }

        // 展示猫咪性别
        function updateDetail(name) {
            const data = catDetails[name];
            if (data) {
                // 更新名字
                document.getElementById('catName').innerText = name;

                // --- 新增：更新性别符号逻辑 ---
                const genderEl = document.getElementById('catGenderSymbol');
                if (data.gender === '公') {
                    genderEl.innerText = '♂';
                    genderEl.style.color = '#3B82F6'; // 蓝色 (Tailwind blue-500)
                } else if (data.gender === '母') {
                    genderEl.innerText = '♀';
                    genderEl.style.color = '#EF4444'; // 红色 (Tailwind red-500)
                } else {
                    genderEl.innerText = ''; // 未知性别不显示
                }

                // 更新其他原有的信息
                document.getElementById('catStatus').innerText = data.status;
                document.getElementById('catLoc').innerText = data.loc;
                // 如果你之前加了毛色信息，也在这里更新
                if (document.getElementById('catColor')) {
                    document.getElementById('catColor').innerText = '毛色：' + data.color;
                }
            }
        }

        // 页面加载时执行
        const urlParams = new URLSearchParams(window.location.search);
        const catName = urlParams.get('name') || '大橘';
        updateDetail(catName);

        // 回到中心点
        document.getElementById('recenter-btn').addEventListener('click', () => {
            map.setZoomAndCenter(16, [118.786000, 31.915500]);
        });
    </script>
</body>
</html>
